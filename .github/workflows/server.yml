name: Server CI

on:
  push:
  pull_request:
    paths:
      - "server/**"

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build -v ./...
