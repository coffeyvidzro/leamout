services:
  postgres:
    image: postgres:16-alpine
    container_name: leamout-postgres
    environment:
      POSTGRES_USER: leamout
      POSTGRES_PASSWORD: leamout
      POSTGRES_DB: leamout
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leamout -d leamout"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: leamout-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
